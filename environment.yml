name: gaze_telme

channels:
  - conda-forge
  - pytorch
  - defaults

dependencies:
  - python=3.9
  - pip
  - numpy=1.26.3
  - pandas=2.1.4
  - scikit-learn=1.3.2
  - tqdm=4.66.1
  - scipy=1.11.4
  - ffmpeg

  # Keep PyTorch on conda for better macOS compatibility.
  # On Linux/CUDA servers, you may prefer reinstalling torch with the cu118 wheels.
  - pytorch=2.1.0
  - torchvision=0.16.0
  - torchaudio=2.1.0

  - pip:
      - transformers==4.36.2
      - torch-geometric==2.4.0
      - einops==0.7.0
      - omegaconf==2.3.0
      - wandb==0.16.2
      - opencv-python==4.9.0.80
      - ffmpeg-python==0.2.0
      - librosa==0.10.1
      - facenet-pytorch==2.5.3
      - retina-face==0.0.17
      - deep-sort-realtime==1.3.2

      # decord is intentionally excluded here because pip wheels are often
      # unavailable on macOS/Apple Silicon. Install separately when needed.
